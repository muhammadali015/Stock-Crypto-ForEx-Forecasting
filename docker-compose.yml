version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: fintech_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - fintech_network

  backend:
    build: .
    container_name: fintech_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/fintech_forecasting?authSource=admin
      FLASK_ENV: production
    depends_on:
      - mongodb
    volumes:
      - ./data:/app/data
    networks:
      - fintech_network

volumes:
  mongodb_data:

networks:
  fintech_network:
    driver: bridge
